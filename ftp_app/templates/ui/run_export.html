{% extends "ui/base.html" %}

{% block page_subtitle %}
  <div class="pageSubtitle">Export management-ready reports (buttons disabled in blueprint).</div>
{% endblock %}

{% block content %}
  <div class="card">
    <div class="cardTitle">Export</div>
    <table>
      <thead><tr><th>Format</th><th></th></tr></thead>
      <tbody>
        {% for f in formats %}
          <tr>
            <td><span class="pill">{{ f }}</span></td>
            <td><a class="btn btn--disabled" href="#">Export {{ f }} (demo only)</a></td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
    <div class="rowActions" style="margin-top: 12px;">
      <a class="btn btn--ghost" href="/runs/{{ run.id }}/results/">Back to results</a>
    </div>
  </div>
{% endblock %}
