{% extends "ui/base.html" %}

{% block page_subtitle %}
  <div class="pageSubtitle">
    Collated input tables (imported data). This keeps inputs separate from later calculation screens.
  </div>
{% endblock %}

{% block content %}
  <div class="card">
    <div class="cardTitle">Imported tables</div>
    <div class="rowActions">
      {% for item in inputs %}
        <a class="btn" href="{{ item.href }}">{{ item.label }} <span class="pill pill--muted">{{ item.count }}</span></a>
      {% endfor %}
    </div>
  </div>
{% endblock %}
