{% extends "ui/base.html" %}

{% block page_subtitle %}
  <div class="pageSubtitle">Add or edit a curve point.</div>
{% endblock %}

{% block content %}
  <div class="card">
    <div class="cardTitle">Curve point</div>
    <form method="post">
      {% csrf_token %}
      <table>
        {{ form.as_table }}
      </table>
      <div class="rowActions" style="margin-top: 12px;">
        <button class="btn" type="submit">Save</button>
        {% if point %}
          <a class="btn btn--ghost" href="/curves/{{ point.currency|lower }}/">Cancel</a>
        {% else %}
          <a class="btn btn--ghost" href="/curves/{{ currency|lower }}/">Cancel</a>
        {% endif %}
      </div>
    </form>
  </div>
{% endblock %}
