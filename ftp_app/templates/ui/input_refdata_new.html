{% extends "ui/base.html" %}

{% block page_subtitle %}
  <div class="pageSubtitle">Add a new reference row. Reporting group is restricted to the ReportingGroup table.</div>
{% endblock %}

{% block content %}
  <div class="card">
    <div class="cardTitle">Add row</div>
    <form method="post">
      {% csrf_token %}
      <table>
        {{ form.as_table }}
      </table>
      <div class="rowActions" style="margin-top: 12px;">
        <button class="btn" type="submit">Create</button>
        <a class="btn btn--ghost" href="/reference-data/input-refdata/">Cancel</a>
      </div>
    </form>
  </div>
{% endblock %}
